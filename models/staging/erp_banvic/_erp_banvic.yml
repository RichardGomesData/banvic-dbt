
sources:
  - name: erp
    description: Esse é o sistema ERP da Banvic com dados de clientes, colaboradores, contas e transações.
    schema: erp_banvic
    tables:
      - name: localidades
        description: Tabela fonte de localidades com informações de cidades e estados.
        columns:
          - name: cod_localidade
            description: chave primaria da tabela localidades.
            data_tests:
              - unique
              - not_null
              
      - name: clientes
        description: Tabela fonte de clientes com informações de pessoais de cada cliente da Banvic.
        columns:
          - name: cod_cliente
            description: chave primaria da tabela clientes.
            data_tests:
              - unique
              - not_null
      - name: agencias
        description: Tabela fonte de agencias  da Banvic. 
        columns:
          - name: cod_agencia
            description: chave primaria da tabela agencias.
            data_tests:
              - unique
              - not_null 
      - name: colaboradores
        description: Tabela fonte de colaboradores com informações de funcionarios da Banvic.  
        columns:
          - name: cod_colaborador
            description: chave primaria da tabela colaboradores.
            data_tests:
              - unique
              - not_null 
      - name: colaborador_agencia
        description: Tabela fonte de colaboradores_agencia com informações de funcionarios da Banvic por agencia.  
        columns:
          - name: cod_colaborador
            description: chave primaria da tabela colaborador_agencia.
            data_tests:
              - unique
              - not_null
      - name: contas
        description: Tabela fonte de contas com informações de contas da Banvic. 
        columns:
          - name: num_conta
            description: chave primaria da tabela contas.
            data_tests:
              - unique
              - not_null
      - name: propostas_credito
        description: Tabela fonte de contas com informações de propostas_credito da Banvic. 
        columns:
          - name: cod_proposta
            description: chave primaria da tabela propostas_credito.
            data_tests:
              - unique
              - not_null
      - name: transacoes
        description: Tabela fonte de contas com informações de transacoes da Banvic. 
        columns:
          - name: cod_transacao
            description: chave primaria da tabela transacoes.
            data_tests:
              - unique
              - not_null